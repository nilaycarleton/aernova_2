name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      # postinstall runs `prisma generate` (schema-only, no DB needed).
      - run: npm ci
      # Accuracy gate: golden-roof extraction, edge classification (ridge/eave/
      # rake lengths off the golden mesh), viewer-transform invertibility,
      # measurement math, overlay geometry, coplanar merge. The real-mesh
      # regression test auto-skips when the (uncommitted) ODM mesh is absent.
      - run: npm test
      - run: npx tsc --noEmit
